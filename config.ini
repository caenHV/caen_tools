[proxy]
input_port = 5559
output_port = 5560
monitor_port = 5561
protocol = tcp
host = localhost

[monitor]
dbpath = /monitor.db
refreshtime = 30 
proxy_frontend = ${proxy:protocol}://${proxy:host}:${proxy:input_port}
proxy_backend = ${proxy:protocol}://${proxy:host}:${proxy:output_port}
identity = monitor
device_identity = ${device:identity}
# refreshtime in seconds (can be float)

[device]
map_config = ./test_config.json
proxy_address = ${proxy:protocol}://${proxy:host}:${proxy:output_port}
identity = setup

[webservice]
querylimit = 10
proxy_address = ${proxy:protocol}://${proxy:host}:${proxy:input_port}
